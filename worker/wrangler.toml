name = "crimson-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

[triggers]
crons = ["*/5 * * * *", "0 3 1 * *"]

[[d1_databases]]
binding = "DB"
database_name = "crimson-db"
database_id = "1e4ce922-0d75-477e-bfc7-97468a4fdf6c"

[[r2_buckets]]
binding = "R2"
bucket_name = "crimson-mangas"

[[kv_namespaces]]
binding = "KV"
id = "b0da4cd5c5894e4cbaa6d6e3137ca1b8"

[vars]
FRONTEND_URL = "https://scancrimson.com"

# Secrets — configurar con Cloudflare CLI:
# wrangler secret put JWT_SECRET
# v2.0 — Email de invitación (Resend):
# wrangler secret put RESEND_API_KEY   (obtener en resend.com)
# wrangler secret put RESEND_FROM      (ej: "Crimson's Scan <noreply@scancrimson.com>")
